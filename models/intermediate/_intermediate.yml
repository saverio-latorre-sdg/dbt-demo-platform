version: 2

models:
  - name: int_order_items
    description: >
      Enriched order line items. Joins lineitems with orders, parts and customers.
      Grain: one row per order line (order_key + line_number).
      Used as the primary input for fct_orders.
    columns:
      - name: order_item_key
        description: Surrogate key generated from order_key and line_number.
        tests:
          - unique
          - not_null
      - name: order_key
        description: Foreign key to orders. Part of the composite grain.
        tests:
          - not_null
      - name: line_number
        description: Line number within the order. Part of the composite grain.
        tests:
          - not_null
      - name: part_key
        description: Foreign key to parts.
        tests:
          - not_null
      - name: supplier_key
        description: Foreign key to suppliers.
        tests:
          - not_null
      - name: customer_key
        description: Foreign key to customers, resolved via orders.
        tests:
          - not_null
      - name: order_date
        description: Date the order was placed.
      - name: order_status_code
        description: Status of the order (O, F, P).
      - name: order_priority_code
        description: Priority level of the order.

      - name: quantity
        description: Quantity ordered on this line.
      - name: extended_price
        description: Extended price before discounts and taxes.
      - name: discount_percentage
        description: Discount applied to the line item.
      - name: tax_rate
        description: Tax rate applied to the line item.
      - name: return_flag
        description: Return flag (R, A, N).
        tests:
          - accepted_values:
              arguments:
                values: ['returned', 'accepted']
      - name: line_status
        description: Line status (O, F).
      - name: ship_date
        description: Date the item was shipped.
      - name: commit_date
        description: Committed delivery date.
      - name: receipt_date
        description: Date the item was received.
      - name: ship_mode
        description: Shipping mode.
      - name: net_item_sales_amount
        description: Extended price after discount.
      - name: gross_item_sales_amount
        description: Extended price after discount and tax.

  - name: int_parts_suppliers
    description: >
      Parts joined with part-supplier relationships. 
      Grain: one row per part/supplier combination (part_key + supplier_key).
      Used to build dim_parts with aggregated supply metrics.
    columns:
      - name: part_key
        description: Foreign key to parts. Part of the composite grain.
        tests:
          - not_null
      - name: supplier_key
        description: Foreign key to suppliers. Part of the composite grain.
        tests:
          - not_null
      - name: part_name
        description: Part name.
      - name: manufacturer
        description: Manufacturer of the part.
      - name: brand
        description: Brand of the part.
      - name: part_type
        description: Type/category of the part.
      - name: part_size
        description: Size of the part.
      - name: container_type
        description: Container type used for shipping.
      - name: retail_price
        description: Retail price of the part.
      - name: available_quantity
        description: Quantity available from this supplier.
        tests:
          - not_null
      - name: supply_cost
        description: Unit cost to procure the part from this supplier.
        tests:
          - not_null
      - name: gross_margin
        description: Retail price minus supply cost.
      - name: gross_margin_percentage
        description: Gross margin as a percentage of retail price.

  - name: int_customers
    description: >
      Enriched customer data with nation and region resolved.
      Grain: one row per customer.
      Used as the source for dim_customers.
    columns:
      - name: customer_key
        description: Primary key of the customer.
        tests:
          - unique
          - not_null
      - name: nation_key
        description: Foreign key to nations.
        tests:
          - not_null
      - name: region_key
        description: Foreign key to regions, resolved via nations.
        tests:
          - not_null
      - name: customer_name
        description: Customer name.
        tests:
          - not_null
      - name: customer_phone
        description: Customer phone number.
      - name: customer_account_balance
        description: Customer account balance.
      - name: market_segment
        description: Market segment of the customer.
      - name: customer_nation
        description: Nation name of the customer.
        tests:
          - not_null
      - name: customer_region
        description: Region name of the customer.
        tests:
          - not_null

  - name: int_suppliers
    description: >
      Enriched supplier data with nation and region resolved.
      Grain: one row per supplier.
      Used as a lookup in fct_orders for supplier geography.
    columns:
      - name: supplier_key
        description: Primary key of the supplier.
        tests:
          - unique
          - not_null
      - name: nation_key
        description: Foreign key to nations.
        tests:
          - not_null
      - name: region_key
        description: Foreign key to regions, resolved via nations.
        tests:
          - not_null
      - name: supplier_name
        description: Supplier name.
      - name: supplier_phone
        description: Supplier phone number.
      - name: supplier_account_balance
        description: Supplier account balance.
      - name: supplier_nation
        description: Nation name of the supplier.
        tests:
          - not_null
      - name: supplier_region
        description: Region name of the supplier.
        tests:
          - not_null