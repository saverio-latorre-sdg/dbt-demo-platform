version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension. Grain: one row per customer.
      Includes geography (nation and region) resolved from intermediate.
    columns:
      - name: customer_key
        description: Primary key of the customer.
        tests:
          - unique
          - not_null
      - name: customer_name
        description: Customer name.
        tests:
          - not_null
      - name: customer_phone
        description: Customer phone number.
      - name: customer_account_balance
        description: Customer account balance.
      - name: market_segment
        description: Market segment (e.g. AUTOMOBILE, BUILDING, FURNITURE).
        tests:
          - not_null
      - name: customer_nation
        description: Nation the customer belongs to.
        tests:
          - not_null
      - name: customer_region
        description: Region the customer belongs to.
        tests:
          - not_null

  - name: dim_suppliers
    description: >
      Supplier dimension. Grain: one row per supplier.
      Includes geography (nation and region) resolved from intermediate.
    columns:
      - name: supplier_key
        description: Primary key of the supplier.
        tests:
          - unique
          - not_null
      - name: supplier_name
        description: Supplier name.
        tests:
          - not_null
      - name: supplier_phone
        description: Supplier phone number.
      - name: supplier_account_balance
        description: Supplier account balance.
      - name: supplier_nation
        description: Nation the supplier belongs to.
        tests:
          - not_null
      - name: supplier_region
        description: Region the supplier belongs to.
        tests:
          - not_null

  - name: dim_parts
    description: >
      Parts dimension. Grain: one row per part.
      Built from int_parts_suppliers — aggregates supply metrics
      (cost, availability, margin) across all suppliers for each part.
    columns:
      - name: part_key
        description: Primary key of the part.
        tests:
          - unique
          - not_null
      - name: part_name
        description: Part name.
        tests:
          - not_null
      - name: manufacturer
        description: Manufacturer of the part.
      - name: brand
        description: Brand of the part.
      - name: part_type
        description: Type/category of the part.
      - name: part_size
        description: Size of the part.
      - name: container_type
        description: Container type used for shipping.
      - name: retail_price
        description: Retail price of the part.
      - name: supplier_count
        description: Number of suppliers that can provide this part.
      - name: total_available_quantity
        description: Total available quantity across all suppliers.
      - name: avg_supply_cost
        description: Average supply cost across all suppliers.
      - name: min_supply_cost
        description: Lowest supply cost available across all suppliers.
      - name: avg_gross_margin_percentage
        description: Average gross margin percentage across all suppliers.

  - name: fct_orders
    description: >
      Core fact table for order line items. Grain: one row per order line
      (order_key + line_number). Contains only foreign keys, measures and
      degenerate dimensions. Join to dim_customers, dim_suppliers and
      dim_parts for descriptive attributes.
    columns:
      - name: order_item_key
        description: Surrogate key generated from order_key and line_number.
        tests:
          - unique
          - not_null

      - name: order_key
        description: Natural key of the order.
        tests:
          - not_null
      - name: line_number
        description: Line number within the order.
        tests:
          - not_null
      - name: part_key
        description: Foreign key to parts.
        tests:
          - not_null
      - name: supplier_key
        description: Foreign key to suppliers.
        tests:
          - not_null
      - name: customer_key
        description: Foreign key to customers.
        tests:
          - not_null

      - name: order_date
        description: Date the order was placed.
        tests:
          - not_null
      - name: ship_date
        description: Date the item was shipped.
      - name: commit_date
        description: Committed delivery date.
      - name: receipt_date
        description: Date the item was received by the customer.

      - name: order_status_code
        description: "Degenerate dim — status of the order: O (open), F (fulfilled), P (in progress)."
      - name: order_priority_code
        description: Degenerate dim — priority level of the order.
      - name: return_flag
        description: "Degenerate dim — return flag: R (returned), A (accepted), N (none)."
      - name: line_status
        description: "Degenerate dim — line status: O (open), F (fulfilled)."
      - name: ship_mode
        description: Degenerate dim — shipping mode.

      - name: quantity
        description: Quantity ordered.
        tests:
          - not_null
      - name: extended_price
        description: Extended price before discounts and taxes.
        tests:
          - not_null
      - name: discount_percentage
        description: Discount applied (0.00 to 0.10).
      - name: tax_rate
        description: Tax rate applied.
      - name: net_item_sales_amount
        description: Revenue after discount — extended_price × (1 - discount_percentage).
        tests:
          - not_null
      - name: gross_item_sales_amount
        description: Revenue after discount and tax — net_item_sales_amount × (1 + tax_rate).
        tests:
          - not_null

      - name: days_to_ship
        description: Days between order_date and ship_date.
      - name: days_in_transit
        description: Days between ship_date and receipt_date.