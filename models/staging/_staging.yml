version: 2

models:
  - name: stg_customers
    description: >
      Staged customer data from the TPC-H source. One row per customer.
    columns:
      - name: customer_key
        description: Primary key of the customer.
        tests:
          - unique
          - not_null
      - name: customer_name
        description: Customer name.
        tests:
          - not_null
      - name: customer_address
        description: Customer address.
      - name: nation_key
        description: Foreign key to stg_nations.
        tests:
          - not_null
      - name: phone_number
        description: Customer phone number.
      - name: account_balance
        description: Account balance of the customer.
      - name: market_segment
        description: Market segment the customer belongs to (e.g. AUTOMOBILE, BUILDING).
      - name: comment
        description: Free-text comment.

  - name: stg_orders
    description: >
      Staged orders data from the TPC-H source. One row per order.
    columns:
      - name: order_key
        description: Primary key of the order.
        tests:
          - unique
          - not_null
      - name: customer_key
        description: Foreign key to stg_tpch__customers.
        tests:
          - not_null
      - name: status_code
        description: "Status of the order: O (open), F (fulfilled), P (in progress)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']
      - name: total_price
        description: Total price of the order.
        tests:
          - not_null
      - name: order_date
        description: Date the order was placed.
        tests:
          - not_null
      - name: priority_code
        description: Priority level of the order.
      - name: clerk_name
        description: Clerk responsible for the order.
      - name: ship_priority
        description: Shipping priority.
      - name: comment
        description: Free-text comment.

  - name: stg_line_items
    description: >
      Staged line item data from the TPC-H source. One row per order line.
      The composite primary key is (order_key, line_number).
      Includes two pre-computed revenue metrics: net and gross item sales amount.
    columns:
      - name: order_key
        description: Foreign key to stg_orders. Part of the composite PK.
        tests:
          - not_null
      - name: line_number
        description: Line number within the order. Part of the composite PK.
        tests:
          - not_null
      - name: part_key
        description: Foreign key to stg_parts.
        tests:
          - not_null
      - name: supplier_key
        description: Foreign key to stg_suppliers.
        tests:
          - not_null
      - name: quantity
        description: Quantity of the part ordered.
        tests:
          - not_null
      - name: extended_price
        description: Extended price (quantity × unit price, before discounts and taxes).
        tests:
          - not_null
      - name: discount_percentage
        description: Discount applied to the line item (between 0.00 and 0.10).
      - name: tax_rate
        description: Tax rate applied to the line item.
      - name: return_flag
        description: "Return flag: R (returned), A (accepted), N (none)."
        tests:
          - accepted_values:
              arguments:
                values: ['R', 'A', 'N']
      - name: line_status
        description: "Line status: O (open), F (fulfilled)."
        tests:
          - accepted_values:
              arguments:
                values: ['O', 'F']
      - name: ship_date
        description: Date the item was shipped.
      - name: commit_date
        description: Committed delivery date.
      - name: receipt_date
        description: Date the item was received by the customer.
      - name: ship_instructions
        description: Shipping instructions.
      - name: ship_mode
        description: Shipping mode (AIR, SHIP, TRUCK, RAIL, MAIL, REG AIR, FOB).
      - name: comment
        description: Free-text comment.
      - name: net_item_sales_amount
        description: Extended price after discount — extended_price × (1 - discount_percentage).
      - name: gross_item_sales_amount
        description: Extended price after discount and tax — net_item_sales_amount × (1 + tax_rate).

  - name: stg_parts
    description: >
      Staged parts catalog from the TPC-H source. One row per part.
    columns:
      - name: part_key
        description: Primary key of the part.
        tests:
          - unique
          - not_null
      - name: part_name
        description: Part name.
        tests:
          - not_null
      - name: manufacturer
        description: Manufacturer of the part.
      - name: brand
        description: Brand of the part.
      - name: part_type
        description: Type/category of the part.
      - name: part_size
        description: Size of the part.
      - name: container_type
        description: Container type used for shipping.
      - name: retail_price
        description: Retail price of the part.
      - name: comment
        description: Free-text comment.

  - name: stg_suppliers
    description: >
      Staged supplier data from the TPC-H source. One row per supplier.
    columns:
      - name: supplier_key
        description: Primary key of the supplier.
        tests:
          - unique
          - not_null
      - name: supplier_name
        description: Supplier name.
        tests:
          - not_null
      - name: supplier_address
        description: Supplier address.
      - name: nation_key
        description: Foreign key to stg_nations.
        tests:
          - not_null
      - name: phone_number
        description: Supplier phone number.
      - name: account_balance
        description: Account balance of the supplier.
      - name: comment
        description: Free-text comment.

  - name: stg_part_suppliers
    description: >
      Staged part-supplier relationship from the TPC-H source.
      The composite primary key is (part_key, supplier_key).
    columns:
      - name: part_key
        description: Foreign key to stg_parts. Part of the composite PK.
        tests:
          - not_null
      - name: supplier_key
        description: Foreign key to stg_suppliers. Part of the composite PK.
        tests:
          - not_null
      - name: available_quantity
        description: Available quantity of the part held by this supplier.
        tests:
          - not_null
      - name: supply_cost
        description: Unit cost to procure the part from this supplier.
        tests:
          - not_null
      - name: comment
        description: Free-text comment.

  - name: stg_nations
    description: >
      Staged nation reference data from the TPC-H source.
      Contains 25 nations, each belonging to a region.
    columns:
      - name: nation_key
        description: Primary key of the nation.
        tests:
          - unique
          - not_null
      - name: nation_name
        description: Nation name.
        tests:
          - not_null
      - name: region_key
        description: Foreign key to stg_regions.
        tests:
          - not_null
      - name: comment
        description: Free-text comment.

  - name: stg_regions
    description: >
      Staged region reference data from the TPC-H source.
      Contains 5 regions: AFRICA, AMERICA, ASIA, EUROPE, MIDDLE EAST.
    columns:
      - name: region_key
        description: Primary key of the region.
        tests:
          - unique
          - not_null
      - name: region_name
        description: Region name.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AFRICA', 'AMERICA', 'ASIA', 'EUROPE', 'MIDDLE EAST']
      - name: comment
        description: Free-text comment.