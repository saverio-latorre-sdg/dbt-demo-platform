version: 2

sources:
  - name: tpch
    description: >
      TPC-H is a decision support benchmark dataset available as a sample
      database in Snowflake. It models a company managing parts, suppliers,
      customers and orders at scale.
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    tables:
      - name: customer
        description: >
          Contains information about customers. Each customer belongs to
          a nation and may have placed multiple orders.
        columns:
          - name: c_custkey
            description: Primary key of the customer.
          - name: c_name
            description: Customer name.
          - name: c_address
            description: Customer address.
          - name: c_nationkey
            description: Foreign key to nation.
          - name: c_phone
            description: Customer phone number.
          - name: c_acctbal
            description: Account balance.
          - name: c_mktsegment
            description: Market segment the customer belongs to.
          - name: c_comment
            description: Free-text comment.

      - name: orders
        description: >
          Contains orders placed by customers. Each order is associated
          with a customer and has one or more line items.
        columns:
          - name: o_orderkey
            description: Primary key of the order.
          - name: o_custkey
            description: Foreign key to customer.
          - name: o_orderstatus
            description: "Status of the order: O (open), F (fulfilled), P (in progress)."
          - name: o_totalprice
            description: Total price of the order.
          - name: o_orderdate
            description: Date the order was placed.
          - name: o_orderpriority
            description: Priority level of the order.
          - name: o_clerk
            description: Clerk responsible for the order.
          - name: o_shippriority
            description: Shipping priority.
          - name: o_comment
            description: Free-text comment.

      - name: lineitem
        description: >
          The largest table in TPC-H. Contains individual line items
          for each order, including pricing, quantities and shipping details.
        columns:
          - name: l_orderkey
            description: Foreign key to orders.
          - name: l_partkey
            description: Foreign key to part.
          - name: l_suppkey
            description: Foreign key to supplier.
          - name: l_linenumber
            description: Line number within the order (composite PK with l_orderkey).
          - name: l_quantity
            description: Quantity ordered.
          - name: l_extendedprice
            description: Extended price (quantity * unit price before discounts/taxes).
          - name: l_discount
            description: Discount applied (0.00 to 0.10).
          - name: l_tax
            description: Tax rate applied.
          - name: l_returnflag
            description: "Return flag: R (returned), A (accepted), N (none)."
          - name: l_linestatus
            description: "Line status: O (open), F (fulfilled)."
          - name: l_shipdate
            description: Date the item was shipped.
          - name: l_commitdate
            description: Committed delivery date.
          - name: l_receiptdate
            description: Date the item was received.
          - name: l_shipinstruct
            description: Shipping instructions.
          - name: l_shipmode
            description: Shipping mode (AIR, SHIP, TRUCK, etc.).
          - name: l_comment
            description: Free-text comment.

      - name: part
        description: >
          Contains the catalog of parts available for ordering.
        columns:
          - name: p_partkey
            description: Primary key of the part.
          - name: p_name
            description: Part name.
          - name: p_mfgr
            description: Manufacturer of the part.
          - name: p_brand
            description: Brand of the part.
          - name: p_type
            description: Type/category of the part.
          - name: p_size
            description: Size of the part.
          - name: p_container
            description: Container type used for shipping.
          - name: p_retailprice
            description: Retail price of the part.
          - name: p_comment
            description: Free-text comment.

      - name: supplier
        description: >
          Contains information about suppliers that provide parts.
          Each supplier belongs to a nation.
        columns:
          - name: s_suppkey
            description: Primary key of the supplier.
          - name: s_name
            description: Supplier name.
          - name: s_address
            description: Supplier address.
          - name: s_nationkey
            description: Foreign key to nation.
          - name: s_phone
            description: Supplier phone number.
          - name: s_acctbal
            description: Account balance.
          - name: s_comment
            description: Free-text comment.

      - name: partsupp
        description: >
          Junction table between parts and suppliers. Represents which
          suppliers can provide which parts, along with cost and availability.
        columns:
          - name: ps_partkey
            description: Foreign key to part (composite PK with ps_suppkey).
          - name: ps_suppkey
            description: Foreign key to supplier (composite PK with ps_partkey).
          - name: ps_availqty
            description: Available quantity in stock.
          - name: ps_supplycost
            description: Unit cost to procure the part from this supplier.
          - name: ps_comment
            description: Free-text comment.

      - name: nation
        description: >
          Reference table containing the 25 nations in the dataset.
          Each nation belongs to a region.
        columns:
          - name: n_nationkey
            description: Primary key of the nation.
          - name: n_name
            description: Nation name.
          - name: n_regionkey
            description: Foreign key to region.
          - name: n_comment
            description: Free-text comment.

      - name: region
        description: >
          Reference table containing the 5 regions in the dataset
          (AFRICA, AMERICA, ASIA, EUROPE, MIDDLE EAST).
        columns:
          - name: r_regionkey
            description: Primary key of the region.
          - name: r_name
            description: Region name.
          - name: r_comment
            description: Free-text comment.
